name: Cohere Transcribe Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'Sources/FluidAudio/ASR/Cohere/**'
      - 'Sources/FluidAudioCLI/Commands/ASR/Cohere/**'
      - 'Sources/FluidAudioCLI/Commands/CohereEncoderTest.swift'
      - '.github/workflows/cohere-transcribe-test.yml'
  workflow_dispatch:

jobs:
  cohere-transcribe-test:
    if: false  # DISABLED - Remove this line to re-enable
    name: Cohere Transcribe - Pure CoreML Test (macOS 15)
    runs-on: macos-15
    permissions:
      contents: read
      pull-requests: write

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Application Support/FluidAudio/Models/cohere-transcribe
          key: ${{ runner.os }}-cohere-${{ hashFiles('Package.resolved', 'Sources/FluidAudio/ASR/Cohere/**') }}

      - name: Build
        run: swift build -c release

      - name: Generate Test Audio
        run: |
          # Create 5 seconds of simple audio (sine wave at 440 Hz)
          swift -e '
          import AVFoundation
          import Foundation

          let sampleRate = 16000.0
          let duration = 5.0
          let frequency = 440.0
          let numSamples = Int(sampleRate * duration)

          var samples = [Float](repeating: 0, count: numSamples)
          for i in 0..<numSamples {
              let t = Double(i) / sampleRate
              samples[i] = Float(0.3 * sin(2.0 * .pi * frequency * t))
          }

          let format = AVAudioFormat(commonFormat: .pcmFormatFloat32, sampleRate: sampleRate, channels: 1, interleaved: false)!
          let buffer = AVAudioPCMBuffer(pcmFormat: format, frameCapacity: AVAudioFrameCount(numSamples))!
          buffer.frameLength = buffer.frameCapacity

          let channelData = buffer.floatChannelData![0]
          for i in 0..<numSamples {
              channelData[i] = samples[i]
          }

          let file = try! AVAudioFile(forWriting: URL(fileURLWithPath: "test_audio.wav"), settings: [
              AVFormatIDKey: kAudioFormatLinearPCM,
              AVSampleRateKey: sampleRate,
              AVNumberOfChannelsKey: 1,
              AVLinearPCMBitDepthKey: 32,
              AVLinearPCMIsFloatKey: true
          ])
          try! file.write(from: buffer)
          print("Generated test audio: test_audio.wav")
          '

      - name: Test Cohere Transcription
        id: transcribe_test
        run: |
          set -o pipefail

          echo "========================================="
          echo "Cohere Transcribe - Pure CoreML Test"
          echo "========================================="
          echo ""
          echo "Platform: macOS 15 (stable)"
          echo "Testing: Full transcription pipeline"
          echo "Purpose: Verify CoreML models work on stable macOS"
          echo ""
          echo "This test will:"
          echo "1. Download models from HuggingFace"
          echo "2. Run pure Swift/CoreML transcription"
          echo "3. Verify encoder produces valid outputs"
          echo ""

          if .build/release/fluidaudiocli cohere-transcribe test_audio.wav 2>&1 | tee transcribe_test.log; then
            echo "TRANSCRIBE_STATUS=PASSED" >> $GITHUB_OUTPUT

            # Check if we got any output
            if grep -q "Final transcription:" transcribe_test.log && grep -A 1 "Final transcription:" transcribe_test.log | tail -1 | grep -v "^$"; then
              echo "✓ Transcription test PASSED - generated text output"
              echo "HAS_OUTPUT=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️  Transcription ran but produced empty output"
              echo "HAS_OUTPUT=false" >> $GITHUB_OUTPUT
            fi

            # Check encoder output
            if grep -q "ENCODER OUTPUT:" transcribe_test.log; then
              ENCODER_MIN=$(grep "Min:" transcribe_test.log | head -1 | awk '{print $2}')
              ENCODER_MAX=$(grep "Max:" transcribe_test.log | head -1 | awk '{print $2}')
              echo "Encoder outputs: min=$ENCODER_MIN max=$ENCODER_MAX"
              echo "ENCODER_MIN=$ENCODER_MIN" >> $GITHUB_OUTPUT
              echo "ENCODER_MAX=$ENCODER_MAX" >> $GITHUB_OUTPUT
            fi
          else
            EXIT_CODE=$?
            echo "TRANSCRIBE_STATUS=FAILED" >> $GITHUB_OUTPUT
            echo "HAS_OUTPUT=false" >> $GITHUB_OUTPUT
            echo "✗ Transcription test FAILED with exit code $EXIT_CODE"
          fi

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const transcribeStatus = '${{ steps.transcribe_test.outputs.TRANSCRIBE_STATUS }}';
            const hasOutput = '${{ steps.transcribe_test.outputs.HAS_OUTPUT }}' === 'true';
            const encoderMin = '${{ steps.transcribe_test.outputs.ENCODER_MIN }}';
            const encoderMax = '${{ steps.transcribe_test.outputs.ENCODER_MAX }}';

            let statusEmoji = '✅';
            let summary = 'CoreML models work correctly on stable macOS 15';
            let conclusion = '';

            if (transcribeStatus !== 'PASSED') {
              statusEmoji = '❌';
              summary = 'Transcription failed on stable macOS';
              conclusion = 'The models fail on **both** macOS 26.5 Beta and stable macOS 15. This suggests a broader CoreML compatibility issue, not just a beta OS bug.';
            } else if (!hasOutput) {
              statusEmoji = '⚠️';
              summary = 'Pipeline runs but produces empty output';
              conclusion = 'The encoder may be producing incorrect outputs (like on macOS 26.5 Beta), causing downstream failures. Check encoder min/max values.';
            } else {
              conclusion = 'The issue reported (garbage encoder outputs on macOS 26.5 Beta) is **isolated to that beta OS**. Models work correctly on stable macOS.';
            }

            const comment = `## ${statusEmoji} Cohere Transcribe Test Results

            **Platform:** macOS 15 (stable)
            **Summary:** ${summary}

            ### Test Results

            | Metric | Value |
            |--------|-------|
            | Transcription Status | ${transcribeStatus === 'PASSED' ? '✅ PASSED' : '❌ FAILED'} |
            | Generated Output | ${hasOutput ? '✅ Yes' : '❌ No (empty)'} |
            ${encoderMin ? `| Encoder Min | ${encoderMin} |` : ''}
            ${encoderMax ? `| Encoder Max | ${encoderMax} |` : ''}

            ${encoderMin && encoderMax ? `
            ### Encoder Output Analysis

            **Expected range:** min ≈ -1.2, max ≈ 1.6

            ${parseFloat(encoderMin) > -2.0 && parseFloat(encoderMin) < 0 && parseFloat(encoderMax) > 1.0 && parseFloat(encoderMax) < 2.0
              ? '✅ Encoder outputs are in the **correct range**'
              : '❌ Encoder outputs are **out of range** (possible CoreML Runtime bug)'}
            ` : ''}

            ### Conclusion

            ${conclusion}

            ---

            <sub>🤖 Pure Swift/CoreML test on stable macOS 15</sub>
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cohere-test-logs
          path: transcribe_test.log
          retention-days: 7
